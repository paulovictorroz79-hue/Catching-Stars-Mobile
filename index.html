<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Catching Stars</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.png" type="image/png">

</head>
<body>

    <h1> Catching Stars</h1>

    <p>Nível: <span id="level">1</span></p>
    <p>Pontos: <span id="score">0</span></p>
    <p>Meta: <span id="goal">0</span></p>
    <p>Tempo: <span id="time">10</span><span class="s">s</span></p>
    <div id="record-area">
    <span>RECORDE: <span id="record">0</span></span>
    <button id="resetRecord">⟲</button>
</div>


<div id="overlay" class="hidden">
    <div id="message-box">
        <h2 id="message-title"></h2>
        <p id="message-text"></p>
        <button id="restartBtn" onclick="restartGame()">Jogar novamente</button>


    </div>
</div>

    <div id="game-area">
        <div id="box"></div>
    </div>

    <button onclick="startGame()">Iniciar</button>
    

 <audio id="clickSound" src="star-click.wav" preload="auto"></audio>
 <audio id="bgMusic" src="arcade-music.mp3" loop></audio>
<audio id="vitoria" src="goodresult-82807.mp3" preload="auto"></audio>
<audio id="gameouver" src="game-over-417465.mp3" preload="auto"></audio>
    <script src="script.js"></script>
   

</body>
</html>
